<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cámara Web Fullscreen Estable</title>

<meta name="viewport"
      content="width=device-width, height=device-height,
               initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
/* ===== BASE ===== */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: system-ui, Arial, sans-serif;
  color: white;
}

/* ===== VIDEO ===== */
#camera, #recordedPreview {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

#recordedPreview {
  display: none;
  z-index: 20;
}

/* ===== HUD ===== */
.hud {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
  align-items: center;
}

.hud span {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
}

/* ===== CONTROLES ===== */
.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}

button {
  width: 52px;
  height: 35px;
  border-radius: 10%;
  border: none;
  font-weight: bold;
  color: white;
  cursor: pointer;
}

.preview { background: #475569; }
.rec     { background: #124ea7; }
.stop    { background: #124ea7; }
.save    { background: #124ea7; }

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ===== TIMER VISUAL ===== */
#recordTimer {
  font-weight: bold;
  color: #ff4d4d;
  letter-spacing: 1px;
}
</style>
</head>

<body>

<!-- VIDEO EN VIVO -->
<video id="camera" autoplay playsinline muted></video>

<!-- VIDEO GRABADO (GUARDAR DESDE AQUÍ) -->
<video id="recordedPreview" controls playsinline></video>

<!-- HUD -->
<div class="hud">
  <span id="hudFormat">Formato: —</span>
  <span id="hudInfo">Esperando…</span>
  <span id="recordTimer">● 00:00</span>
</div>

<!-- CONTROLES -->
<div class="controls">
  <button id="btnPreview" class="preview">PREV</button>
  <button id="btnRec"     class="rec" disabled>REC</button>
  <button id="btnStop"    class="stop" disabled>STOP</button>
  <button id="btnSave"    class="save" disabled>SAVE</button>
</div>

<script>
/* ===== ELEMENTOS ===== */
const cam = document.getElementById("camera");
const preview = document.getElementById("recordedPreview");

const btnPreview = document.getElementById("btnPreview");
const btnRec     = document.getElementById("btnRec");
const btnStop    = document.getElementById("btnStop");
const btnSave    = document.getElementById("btnSave");

const hudFormat = document.getElementById("hudFormat");
const hudInfo   = document.getElementById("hudInfo");
const recordTimer = document.getElementById("recordTimer");

/* ===== ESTADO ===== */
let stream = null;
let recorder = null;
let chunks = [];
let blob = null;

let mimeType = "video/webm";
let ext = "webm";

/* ===== TIMER ===== */
let timerInterval = null;
let secondsElapsed = 0;

/* ===== FORMATO SOPORTADO ===== */
function chooseFormat() {
  const formats = [
    { type: 'video/mp4;codecs="avc1.42E01E,mp4a.40.2"', ext: 'mp4' },
    { type: 'video/mp4', ext: 'mp4' },
    { type: 'video/webm', ext: 'webm' }
  ];
  for (const f of formats) {
    if (window.MediaRecorder?.isTypeSupported(f.type)) {
      mimeType = f.type;
      ext = f.ext;
      return;
    }
  }
}

/* ===== PREVIEW ===== */
async function startPreview() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } },
    audio: false
  });

  cam.srcObject = stream;

  const track = stream.getVideoTracks()[0];
  const caps = track.getCapabilities?.();

  let w = 1920, h = 1080, fps = 60;
  if (caps?.width?.max) {
    if (caps.width.max >= 3840) {
      w = 3840; h = 2160; fps = 30;
    }
    await track.applyConstraints({
      width: { ideal: w },
      height: { ideal: h },
      frameRate: { ideal: fps }
    });
  }

  const s = track.getSettings();
  hudInfo.textContent = `${s.width}×${s.height} @ ${Math.round(s.frameRate || fps)}fps`;
  btnRec.disabled = false;
}

/* ===== INICIAR TIMER ===== */
function startTimer() {
  secondsElapsed = 0;
  recordTimer.textContent = "● 00:00";

  timerInterval = setInterval(() => {
    secondsElapsed++;
    const min = String(Math.floor(secondsElapsed / 60)).padStart(2, "0");
    const sec = String(secondsElapsed % 60).padStart(2, "0");
    recordTimer.textContent = `● ${min}:${sec}`;
  }, 1000);
}

/* ===== DETENER TIMER ===== */
function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

/* ===== GRABAR ===== */
function startRecording() {
  chooseFormat();
  chunks = [];
  blob = null;

  recorder = new MediaRecorder(stream, {
    mimeType,
    videoBitsPerSecond: 10_000_000
  });

  recorder.ondataavailable = e => e.data.size && chunks.push(e.data);

  recorder.onstop = () => {
    blob = new Blob(chunks, { type: mimeType });
    btnSave.disabled = false;
    stopTimer();
  };

  recorder.start();
  startTimer();

  hudFormat.textContent = ext === "mp4" ? "Formato: MP4" : "Formato: WebM";
  btnRec.disabled = true;
  btnStop.disabled = false;
}

/* ===== DETENER ===== */
function stopRecording() {
  if (recorder && recorder.state !== "inactive") recorder.stop();
  btnStop.disabled = true;
}

/* ===== SAVE → VIDEO CONTROLS ===== */
function saveVideo() {
  if (!blob) return;

  const url = URL.createObjectURL(blob);

  cam.style.display = "none";
  preview.src = url;
  preview.style.display = "block";

  btnSave.disabled = true;
  btnRec.disabled = false;
}

/* ===== EVENTOS ===== */
btnPreview.onclick = startPreview;
btnRec.onclick     = startRecording;
btnStop.onclick    = stopRecording;
btnSave.onclick    = saveVideo;
</script>

</body>
</html>
