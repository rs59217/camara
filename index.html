<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Camara Trasera MP4</title>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  width: 100%;
  height: 100%;
  overflow: hidden;
  color: white;
  font-family: system-ui, Arial, sans-serif;
}

video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}

button {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.start { background: #16a34a; }
.stop  { background: #dc2626; }
.save  { background: #2563eb; }

button:disabled {
  opacity: 0.5;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>

<div class="controls">
  <button id="btnStart" class="start">REC</button>
  <button id="btnStop"  class="stop" disabled>STOP</button>
  <button id="btnSave"  class="save" disabled>SAVE</button>
</div>

<script>
const cam = document.getElementById("camera");
const btnStart = document.getElementById("btnStart");
const btnStop  = document.getElementById("btnStop");
const btnSave  = document.getElementById("btnSave");

let stream, recorder, chunks = [], blob;

/* ===== DETECTAR MP4 ===== */
function canRecordMP4() {
  return window.MediaRecorder &&
    MediaRecorder.isTypeSupported('video/mp4;codecs="avc1.42E01E"');
}

/* ===== INICIAR CÁMARA TRASERA ===== */
async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { exact: "environment" },
      width: { ideal: 1920 },
      height:{ ideal: 1080 },
      frameRate:{ ideal: 30 }
    },
    audio: false
  });

  cam.srcObject = stream;
}

/* ===== GRABAR ===== */
function startRecording() {
  if (!canRecordMP4()) {
    alert("Este navegador NO soporta grabación MP4.\nUse Safari.");
    return;
  }

  chunks = [];
  recorder = new MediaRecorder(stream, {
    mimeType: 'video/mp4;codecs="avc1.42E01E"',
    videoBitsPerSecond: 6_000_000
  });

  recorder.ondataavailable = e => e.data.size && chunks.push(e.data);

  recorder.onstop = () => {
    blob = new Blob(chunks, { type: "video/mp4" });
    btnSave.disabled = false;
  };

  recorder.start();

  btnStart.disabled = true;
  btnStop.disabled = false;
}

/* ===== DETENER ===== */
function stopRecording() {
  recorder.stop();
  btnStop.disabled = true;
  btnStart.disabled = false;
}

/* ===== SAVE → NUEVA VENTANA ===== */
function saveVideo() {
  if (!blob) return;

  const url = URL.createObjectURL(blob);

  const win = window.open("", "_blank");
  win.document.write(`
    <html>
    <head>
      <title>Video MP4</title>
      <meta name="viewport" content="width=device-width,initial-scale=1.0">
      <style>
        body {
          margin:0;
          background:black;
          display:flex;
          justify-content:center;
          align-items:center;
          height:100vh;
        }
        video {
          width:100%;
          height:100%;
          object-fit:contain;
        }
      </style>
    </head>
    <body>
      <video src="${url}" controls autoplay></video>
    </body>
    </html>
  `);
}

/* ===== EVENTS ===== */
btnStart.onclick = async () => {
  if (!stream) await startCamera();
  startRecording();
};

btnStop.onclick = stopRecording;
btnSave.onclick = saveVideo;
</script>

</body>
</html>
