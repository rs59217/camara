<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cámara Web Fullscreen</title>

<meta name="viewport"
      content="width=device-width, height=device-height,
               initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
/* ===== BASE ===== */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: system-ui, Arial, sans-serif;
  color: white;
}

/* ===== VIDEO ===== */
#camera, #recordedPreview {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

#recordedPreview {
  display: none;
  z-index: 20;
}

/* ===== HUD ===== */
.hud {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.hud span {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
}

/* ===== CONTROLES ===== */
.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}

button {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  font-weight: bold;
  color: white;
  cursor: pointer;
}

.preview { background: #475569; }
.rec     { background: #16a34a; }
.stop    { background: #dc2626; }
.save    { background: #2563eb; }

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="camera" autoplay playsinline muted></video>
<video id="recordedPreview" controls playsinline></video>

<!-- HUD -->
<div class="hud">
  <span id="hudFormat">Formato: —</span>
  <span id="hudInfo">—</span>
</div>

<!-- BOTONES -->
<div class="controls">
  <button id="btnPreview" class="preview">PREV</button>
  <button id="btnRec"     class="rec" disabled>REC</button>
  <button id="btnStop"    class="stop" disabled>STOP</button>
  <button id="btnSave"    class="save" disabled>SAVE</button>
</div>

<script>
/* ===== ELEMENTOS ===== */
const cam = document.getElementById("camera");
const preview = document.getElementById("recordedPreview");

const btnPreview = document.getElementById("btnPreview");
const btnRec     = document.getElementById("btnRec");
const btnStop    = document.getElementById("btnStop");
const btnSave    = document.getElementById("btnSave");

const hudFormat = document.getElementById("hudFormat");
const hudInfo   = document.getElementById("hudInfo");

/* ===== ESTADO ===== */
let stream = null;
let recorder = null;
let chunks = [];
let blob = null;

let mimeType = "video/webm";
let ext = "webm";

/* ===== iOS DETECTION ===== */
function isIOS() {
  return (
    /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)
  );
}

/* ===== FORMATO ÓPTIMO ===== */
function chooseFormat() {
  const formats = [
    { type: 'video/mp4;codecs="avc1.42E01E,mp4a.40.2"', ext: 'mp4' },
    { type: 'video/mp4', ext: 'mp4' },
    { type: 'video/webm', ext: 'webm' }
  ];

  for (const f of formats) {
    if (window.MediaRecorder?.isTypeSupported(f.type)) {
      mimeType = f.type;
      ext = f.ext;
      return;
    }
  }
}

/* ===== PREVIEW CAMARA ===== */
async function startPreview() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: "environment" },
      frameRate: { ideal: 60 }
    },
    audio: false
  });

  cam.srcObject = stream;

  const track = stream.getVideoTracks()[0];
  const settings = track.getSettings();

  hudInfo.textContent = `${settings.width}x${settings.height} @ ${settings.frameRate || "?"}fps`;

  btnRec.disabled = false;
}

/* ===== GRABAR ===== */
function startRecording() {
  chooseFormat();

  chunks = [];
  blob = null;

  recorder = new MediaRecorder(stream, {
    mimeType,
    videoBitsPerSecond: 10_000_000
  });

  recorder.ondataavailable = e => e.data.size && chunks.push(e.data);

  recorder.onstop = () => {
    blob = new Blob(chunks, { type: mimeType });
    btnSave.disabled = false;
  };

  recorder.start();

  hudFormat.textContent = ext === "mp4" ? "Formato: MP4" : "Formato: WebM";

  btnRec.disabled = true;
  btnStop.disabled = false;
}

/* ===== DETENER ===== */
function stopRecording() {
  if (recorder && recorder.state !== "inactive") {
    recorder.stop();
  }
  btnStop.disabled = true;
}

/* ===== SAVE / DESCARGA ===== */
function saveVideo() {
  if (!blob) {
    alert("No hay video para guardar");
    return;
  }

  const url = URL.createObjectURL(blob);

  // Descarga directa
  const a = document.createElement("a");
  a.href = url;
  a.download = `video_${Date.now()}.${ext}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // iOS fallback
  if (isIOS()) {
    cam.style.display = "none";
    preview.src = url;
    preview.style.display = "block";
  } else {
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  btnSave.disabled = true;
  btnRec.disabled = false;
}

/* ===== EVENTOS ===== */
btnPreview.onclick = startPreview;
btnRec.onclick     = startRecording;
btnStop.onclick    = stopRecording;
btnSave.onclick    = saveVideo;
</script>

</body>
</html>
