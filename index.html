<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cámara Fluida con Guardado Seguro</title>

<meta name="viewport"
      content="width=device-width,height=device-height,
      initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  color: white;
  font-family: system-ui, Arial, sans-serif;
}

video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

#recordedPreview {
  display: none;
  z-index: 20;
}

.hud {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.hud span {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
}

.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}

button {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  font-weight: bold;
  color: white;
  cursor: pointer;
}

.preview { background: #475569; }
.rec     { background: #16a34a; }
.stop    { background: #dc2626; }
.save    { background: #2563eb; }

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>

<body>

<!-- Cámara en vivo -->
<video id="camera" autoplay playsinline muted></video>

<!-- Video grabado con CONTROLS -->
<video id="recordedPreview" controls playsinline></video>

<!-- HUD -->
<div class="hud">
  <span id="status">Listo</span>
  <span id="info">—</span>
  <span id="timer">● 00:00</span>
</div>

<!-- Controles -->
<div class="controls">
  <button id="btnPreview" class="preview">PREV</button>
  <button id="btnRec"     class="rec" disabled>REC</button>
  <button id="btnStop"    class="stop" disabled>STP</button>
  <button id="btnSave"    class="save" disabled>SAVE</button>
</div>

<script>
/* ===== ELEMENTOS ===== */
const cam      = document.getElementById("camera");
const preview  = document.getElementById("recordedPreview");

const btnPreview = document.getElementById("btnPreview");
const btnRec     = document.getElementById("btnRec");
const btnStop    = document.getElementById("btnStop");
const btnSave    = document.getElementById("btnSave");

const status = document.getElementById("status");
const info   = document.getElementById("info");
const timer  = document.getElementById("timer");

/* ===== ESTADO ===== */
let stream = null;
let recorder = null;
let chunks = [];
let blob = null;
let recording = false;

let timerId = null;
let seconds = 0;

/* ===== TIMER ===== */
function startTimer() {
  seconds = 0;
  timer.textContent = "● 00:00";
  timerId = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, "0");
    const s = String(seconds % 60).padStart(2, "0");
    timer.textContent = `● ${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerId);
}

/* ===== PREVIEW CÁMARA (FLUIDO) ===== */
async function startPreview() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } },
    audio: false
  });

  cam.srcObject = stream;
  cam.style.display = "block";
  preview.style.display = "none";

  const track = stream.getVideoTracks()[0];
  const caps = track.getCapabilities?.();

  let w = 1920, h = 1080, fps = 60;
  if (caps?.width?.max >= 3840) {
    w = 3840; h = 2160; fps = 30;
  }

  await track.applyConstraints({
    width:  { ideal: w },
    height: { ideal: h },
    frameRate: { ideal: fps }
  });

  const s = track.getSettings();
  info.textContent = `${s.width}×${s.height} @ ${Math.round(s.frameRate || fps)}fps`;

  btnRec.disabled = false;
  status.textContent = "Cámara lista";
}

/* ===== GRABAR ===== */
function startRecording() {
  if (!stream || recording) return;

  chunks = [];
  blob = null;
  recording = true;

  recorder = new MediaRecorder(stream, {
    videoBitsPerSecond: 10_000_000
  });

  recorder.ondataavailable = e => e.data.size && chunks.push(e.data);

  recorder.onstop = () => {
    blob = new Blob(chunks, { type: recorder.mimeType });
    stopTimer();
    btnSave.disabled = false;
    status.textContent = "Grabación lista";
  };

  recorder.start();
  startTimer();

  btnRec.disabled = true;
  btnStop.disabled = false;
  status.textContent = "Grabando…";
}

/* ===== DETENER ===== */
function stopRecording() {
  if (!recording) return;
  recording = false;
  recorder.stop();
  btnStop.disabled = true;
  btnRec.disabled = false;
}

/* ===== GUARDAR (VIDEO CONTROLS) ===== */
function saveVideo() {
  if (!blob) return;

  const url = URL.createObjectURL(blob);

  cam.style.display = "none";
  preview.src = url;
  preview.style.display = "block";

  btnSave.disabled = true;
  status.textContent = "Usa el reproductor para guardar";
}

/* ===== EVENTOS ===== */
btnPreview.onclick = startPreview;
btnRec.onclick     = startRecording;
btnStop.onclick    = stopRecording;
btnSave.onclick    = saveVideo;
</script>

</body>
</html>
