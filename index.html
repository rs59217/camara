<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cámara Web Grabador Estable</title>

<meta name="viewport"
      content="width=device-width,height=device-height,
               initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: system-ui, Arial, sans-serif;
  color: white;
}

video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

/* Preview */
#recordedPreview {
  display: none;
  z-index: 20;
}

/* HUD */
.hud {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.hud span {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
}

/* Controles */
.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}

button {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.preview { background: #475569; }
.rec     { background: #16a34a; }
.stop    { background: #dc2626; }
.save    { background: #2563eb; }

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>

<body>

<!-- Cámara -->
<video id="camera" autoplay playsinline muted></video>

<!-- Preview grabado -->
<video id="recordedPreview" controls playsinline></video>

<!-- HUD -->
<div class="hud">
  <span id="hudStatus">Listo</span>
  <span id="hudInfo">—</span>
  <span id="hudTimer">● 00:00</span>
</div>

<!-- Controles -->
<div class="controls">
  <button id="btnPreview" class="preview">PREV</button>
  <button id="btnRec"     class="rec" disabled>REC</button>
  <button id="btnStop"    class="stop" disabled>STOP</button>
  <button id="btnSave"    class="save" disabled>SAVE</button>
</div>

<script>
/* ===== ELEMENTOS ===== */
const camera  = document.getElementById("camera");
const preview = document.getElementById("recordedPreview");

const btnPreview = document.getElementById("btnPreview");
const btnRec     = document.getElementById("btnRec");
const btnStop    = document.getElementById("btnStop");
const btnSave    = document.getElementById("btnSave");

const hudStatus = document.getElementById("hudStatus");
const hudInfo   = document.getElementById("hudInfo");
const hudTimer  = document.getElementById("hudTimer");

/* ===== ESTADO GLOBAL ===== */
let stream = null;
let recorder = null;
let chunks = [];
let recordedBlob = null;
let isRecording = false;

/* ===== TIMER ===== */
let timerInterval = null;
let seconds = 0;

function resetTimer() {
  clearInterval(timerInterval);
  seconds = 0;
  hudTimer.textContent = "● 00:00";
}

function startTimer() {
  resetTimer();
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, "0");
    const s = String(seconds % 60).padStart(2, "0");
    hudTimer.textContent = `● ${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

/* ===== PREVIEW DE CÁMARA ===== */
async function startPreview() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    });

    camera.srcObject = stream;
    camera.style.display = "block";
    preview.style.display = "none";

    // Perfil estable
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities?.();

    if (caps?.width?.max) {
      let w = 1920, h = 1080, fps = 60;
      if (caps.width.max >= 3840) { w = 3840; h = 2160; fps = 30; }
      await track.applyConstraints({
        width: { ideal: w },
        height:{ ideal: h },
        frameRate: { ideal: fps }
      });
    }

    const s = track.getSettings();
    hudInfo.textContent = `${s.width}×${s.height} @ ${Math.round(s.frameRate || 30)}fps`;

    btnRec.disabled = false;
    hudStatus.textContent = "Cámara lista";
  } catch (err) {
    alert("No se pudo acceder a la cámara");
    console.error(err);
  }
}

/* ===== INICIAR GRABACIÓN ===== */
function startRecording() {
  if (!stream || isRecording) return;

  recordedBlob = null;
  chunks = [];
  isRecording = true;

  recorder = new MediaRecorder(stream, {
    videoBitsPerSecond: 10_000_000
  });

  recorder.ondataavailable = e => e.data.size && chunks.push(e.data);

  recorder.onstop = () => {
    recordedBlob = new Blob(chunks, { type: recorder.mimeType });
    stopTimer();
    btnSave.disabled = false;
    hudStatus.textContent = "Grabación lista";
  };

  recorder.start();
  startTimer();

  btnRec.disabled = true;
  btnStop.disabled = false;
  btnSave.disabled = true;
  hudStatus.textContent = "Grabando…";
}

/* ===== DETENER ===== */
function stopRecording() {
  if (!recorder || !isRecording) return;

  isRecording = false;
  recorder.stop();

  btnStop.disabled = true;
  btnRec.disabled = false;
}

/* ===== MOSTRAR PREVIEW ===== */
function saveVideo() {
  if (!recordedBlob) return;

  const url = URL.createObjectURL(recordedBlob);

  camera.style.display = "none";
  preview.src = url;
  preview.style.display = "block";

  btnSave.disabled = true;
  resetTimer();
}

/* ===== EVENTOS ===== */
btnPreview.onclick = startPreview;
btnRec.onclick     = startRecording;
btnStop.onclick    = stopRecording;
btnSave.onclick    = saveVideo;
</script>

</body>
</html>
