<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Cámara Web Fullscreen</title>

<meta name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
/* =========================
   ESTILOS GENERALES
========================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: system-ui, Arial, sans-serif;
  color: white;
}

/* =========================
   VIDEO FULLSCREEN
========================= */
#camera {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover; /* Llenar sin bajar calidad */
  background: black;
}

/* =========================
   HUD (INFO)
========================= */
.hud {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  z-index: 10;
}

.hud span {
  background: rgba(0, 0, 0, 0.55);
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
}

/* =========================
   CONTROLES
========================= */
.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}

button {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  font-weight: bold;
  color: white;
  cursor: pointer;
}

.preview { background: #475569; }
.start   { background: #005f23; }
.stop    { background: #b00000; }
.save    { background: #625f00; }

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>

<body>

<!-- VIDEO PREVIEW -->
<video id="camera" autoplay playsinline muted></video>

<!-- HUD -->
<div class="hud">
  <span id="hudFormat">Formato: —</span>
  <span id="hudResolution">Resolución: —</span>
  <span id="hudFPS">FPS: —</span>
</div>

<!-- CONTROLES -->
<div class="controls">
  <button id="btnPreview" class="preview">PREV</button>
  <button id="btnStart"   class="start"  disabled>REC</button>
  <button id="btnStop"    class="stop"   disabled>STOP</button>
  <button id="btnSave"    class="save"   disabled>SAVE</button>
</div>

<script>
/* =========================
   VARIABLES GLOBALES
========================= */
const video = document.getElementById('camera');

const btnPreview = document.getElementById('btnPreview');
const btnStart   = document.getElementById('btnStart');
const btnStop    = document.getElementById('btnStop');
const btnSave    = document.getElementById('btnSave');

const hudFormat     = document.getElementById('hudFormat');
const hudResolution = document.getElementById('hudResolution');
const hudFPS        = document.getElementById('hudFPS');

let stream;
let recorder;
let chunks = [];
let recordedBlob = null;

let chosenMime = 'video/webm';
let chosenExt  = 'webm';

let fpsLast = performance.now();

/* =========================
   SELECCIÓN DE FORMATO
========================= */
function pickBestMimeType() {
  const candidates = [
    { mime: 'video/mp4;codecs="avc1.42E01E,mp4a.40.2"', ext: 'mp4' },
    { mime: 'video/mp4', ext: 'mp4' },
    { mime: 'video/webm;codecs=vp9,opus', ext: 'webm' },
    { mime: 'video/webm;codecs=vp8,opus', ext: 'webm' },
    { mime: 'video/webm', ext: 'webm' }
  ];

  for (const c of candidates) {
    if (window.MediaRecorder?.isTypeSupported?.(c.mime)) {
      chosenMime = c.mime;
      chosenExt  = c.ext;
      return;
    }
  }
}

/* =========================
   PREVIEW + CALIDAD AUTO
========================= */
async function startPreview() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: 'environment' }
    },
    audio: {
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    }
  });

  video.srcObject = stream;

  const track = stream.getVideoTracks()[0];
  const caps  = track.getCapabilities?.();

  if (caps) {
    await track.applyConstraints({
      width:     { ideal: caps.width?.max  || 1920 },
      height:    { ideal: caps.height?.max || 1080 },
      frameRate: { ideal: caps.frameRate?.max || 30 }
    });
  }

  btnStart.disabled = false;

  updateHUD();
  startFPSCounter();
}

/* =========================
   GRABAR
========================= */
function startRecording() {
  pickBestMimeType();
  chunks = [];
  recordedBlob = null;

  recorder = new MediaRecorder(stream, {
    mimeType: chosenMime,
    videoBitsPerSecond: 12_000_000,
    audioBitsPerSecond: 192_000
  });

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.start();

  btnStart.disabled = true;
  btnStop.disabled  = false;
  btnSave.disabled  = true;

  hudFormat.textContent =
    chosenExt === 'mp4' ? 'Formato: MP4 (H.264)' : 'Formato: WebM';
}

/* =========================
   DETENER
========================= */
function stopRecording() {
  recorder.stop();
  recorder.onstop = () => {
    recordedBlob = new Blob(chunks, { type: chosenMime });
    btnSave.disabled = false;
  };

  btnStop.disabled = true;
}

/* =========================
   GUARDAR MP4 REAL
========================= */
function saveVideo() {
  if (!recordedBlob) return;

  if (chosenExt !== 'mp4') {
    alert(
      'MP4 no está disponible en este navegador.\n\n' +
      'Este dispositivo guarda en WebM.\n' +
      'Para MP4 real usa Safari en iPhone/iPad.'
    );
    return;
  }

  const url = URL.createObjectURL(recordedBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `video_${Date.now()}.mp4`;
  a.click();

  URL.revokeObjectURL(url);

  btnStart.disabled = false;
  btnSave.disabled  = true;
}

/* =========================
   HUD INFO
========================= */
function updateHUD() {
  const s = stream.getVideoTracks()[0].getSettings();
  hudResolution.textContent = `Resolución: ${s.width}×${s.height}`;
}

function startFPSCounter() {
  function frame() {
    const now = performance.now();
    const fps = Math.round(1000 / (now - fpsLast));
    fpsLast = now;
    hudFPS.textContent = `FPS: ${fps}`;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* =========================
   EVENTS
========================= */
btnPreview.onclick = startPreview;
btnStart.onclick   = startRecording;
btnStop.onclick    = stopRecording;
btnSave.onclick    = saveVideo;

</script>

</body>
</html>
