<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Camara Fullscreen</title>
<meta name="viewport"
  content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  width: 100%;
  height: 100%;
}

/* Video a pantalla completa */
#camera {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

/* Controles flotantes */
.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
  z-index: 10;
}

button {
  width: 72px;
  height: 50px;
  border-radius: 10%;
  border: none;
  font-size: 13px;
  font-weight: bold;
  color: white;
  cursor: pointer;
}

.start { background: #16a34a; }
.stop  { background: #dc2626; }
.save  { background: #2563eb; }
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>
<body>

<video id="camera" autoplay playsinline muted></video>

<div class="controls">
  <button id="btnStart" class="start" onclick="startRecording()">REC</button>
  <button id="btnStop"  class="stop"  onclick="stopRecording()" disabled>STOP</button>
  <button id="btnSave"  class="save"  onclick="saveVideo()" disabled>SAVE</button>
</div>

<script>
let stream;
let mediaRecorder;
let chunks = [];
let recordedBlob = null;

async function startRecording() {
  chunks = [];
  recordedBlob = null;

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { exact: "environment" } },
    audio: true
  });

  document.getElementById("camera").srcObject = stream;

  mediaRecorder = new MediaRecorder(stream, {
    mimeType: "video/webm"
  });

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  mediaRecorder.start();

  btnStart.disabled = true;
  btnStop.disabled  = false;
  btnSave.disabled  = true;
}

function stopRecording() {
  if (!mediaRecorder) return;

  mediaRecorder.stop();

  mediaRecorder.onstop = () => {
    recordedBlob = new Blob(chunks, { type: "video/webm" });
    stream.getTracks().forEach(t => t.stop());

    btnSave.disabled = false;
  };

  btnStop.disabled = true;
}

function saveVideo() {
  if (!recordedBlob) return;

  const url = URL.createObjectURL(recordedBlob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `video_${Date.now()}.webm`;
  a.click();

  URL.revokeObjectURL(url);

  btnStart.disabled = false;
  btnSave.disabled  = true;
}
</script>

</body>
</html>
