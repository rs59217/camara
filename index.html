<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Grabador Web – Cámara Trasera Fluida</title>

<meta name="viewport"
      content="width=device-width,height=device-height,
               initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  width: 100%;
  height: 100%;
  overflow: hidden;
  color: white;
  font-family: system-ui, Arial, sans-serif;
}

video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

/* HUD */
.hud {
  position: fixed;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.hud span {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
}

/* Controles */
.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}

button {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  font-weight: bold;
  color: white;
  cursor: pointer;
}

.preview { background: #475569; }
.rec     { background: #16a34a; }
.stop    { background: #dc2626; }
.save    { background: #2563eb; }

button:disabled {
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- Cámara en vivo -->
<video id="camera" autoplay playsinline muted></video>

<!-- HUD -->
<div class="hud">
  <span id="status">Listo</span>
  <span id="timer">● 00:00</span>
</div>

<!-- Controles -->
<div class="controls">
  <button id="btnPreview" class="preview">PREV</button>
  <button id="btnRec" class="rec" disabled>REC</button>
  <button id="btnStop" class="stop" disabled>STOP</button>
  <button id="btnSave" class="save" disabled>SAVE</button>
</div>

<script>
/* ========= ELEMENTOS ========= */
const camera = document.getElementById("camera");

const btnPreview = document.getElementById("btnPreview");
const btnRec     = document.getElementById("btnRec");
const btnStop    = document.getElementById("btnStop");
const btnSave    = document.getElementById("btnSave");

const statusEl = document.getElementById("status");
const timerEl  = document.getElementById("timer");

/* ========= ESTADO ========= */
let stream = null;
let recorder = null;
let chunks = [];
let recordedBlob = null;
let recording = false;

let timerId = null;
let seconds = 0;

/* ========= TIMER ========= */
function startTimer() {
  seconds = 0;
  timerEl.textContent = "● 00:00";
  timerId = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, "0");
    const s = String(seconds % 60).padStart(2, "0");
    timerEl.textContent = `● ${m}:${s}`;
  }, 1000);
}
function stopTimer() {
  clearInterval(timerId);
}

/* ========= INICIAR CÁMARA (TRASERA + BUEN AUDIO + FLUIDEZ) ========= */
async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { exact: "environment" },   // SOLO cámara trasera
      width:  { ideal: 1920 },
      height: { ideal: 1080 },
      frameRate: { ideal: 30 }               // fluidez estable
    },
    audio: {
      echoCancellation: true,   // mejor audio
      noiseSuppression: true,
      autoGainControl: true
    }
  });

  camera.srcObject = stream;
  statusEl.textContent = "Cámara lista";
  btnRec.disabled = false;
}

/* ========= GRABAR ========= */
function startRecording() {
  if (!stream || recording) return;

  chunks = [];
  recordedBlob = null;
  recording = true;

  recorder = new MediaRecorder(stream, {
    videoBitsPerSecond: 5_000_000,  // CLAVE para evitar lag
    audioBitsPerSecond: 128_000
  });

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    recordedBlob = new Blob(chunks, { type: recorder.mimeType });
    stopTimer();
    btnSave.disabled = false;
    statusEl.textContent = "Grabación lista";
  };

  recorder.start();
  startTimer();

  btnRec.disabled = true;
  btnStop.disabled = false;
  statusEl.textContent = "Grabando…";
}

/* ========= DETENER ========= */
function stopRecording() {
  if (!recording) return;
  recording = false;
  recorder.stop();
  btnStop.disabled = true;
  btnRec.disabled = false;
}

/* ========= SAVE → nueva ventana con <video controls> ========= */
function saveVideo() {
  if (!recordedBlob) return;

  const url = URL.createObjectURL(recordedBlob);
  const win = window.open("", "_blank");

  win.document.write(`
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Video grabado</title>
<style>
  html,body{margin:0;height:100%;background:black}
  video{width:100%;height:100%;object-fit:contain}
</style>
</head>
<body>
  <video controls autoplay src="${url}"></video>
</body>
</html>
  `);

  statusEl.textContent = "Usa los controles para guardar";
  btnSave.disabled = true;
}

/* ========= EVENTOS ========= */
btnPreview.onclick = startCamera;
btnRec.onclick     = startRecording;
btnStop.onclick    = stopRecording;
btnSave.onclick    = saveVideo;
</script>

</body>
</html>
