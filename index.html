<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Cámara Fullscreen • Preview + Calidad Adaptativa</title>
<meta name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<style>
  :root { --bg: #000; --ok:#16a34a; --warn:#dc2626; --info:#2563eb; }
  html, body { margin:0; padding:0; width:100%; height:100%; background:var(--bg); overflow:hidden; color:#fff; font-family:system-ui, Arial, sans-serif; }
  #camera { position:fixed; inset:0; width:100vw; height:100vh; object-fit:cover; background:#000; }
  .hud {
    position:fixed; top:12px; left:12px; right:12px; display:flex; gap:8px; flex-wrap:wrap;
    font-size:12px; line-height:1.4; pointer-events:none;
  }
  .chip { background:rgba(0,0,0,.5); padding:6px 10px; border-radius:999px; pointer-events:auto; }
  .controls {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:12px; z-index:10;
  }
  button {
    width:72px; height:72px; border-radius:50%; border:none; font-weight:700; color:#fff; cursor:pointer;
  }
  .preview { background:#475569; }
  .start   { background:var(--ok);  }
  .stop    { background:var(--warn);}
  .save    { background:var(--info);}
  button:disabled { opacity:.5; cursor:not-allowed; }
  .note { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); font-size:12px; opacity:.8; }
</style>
</head>
<body>

<video id="camera" autoplay playsinline muted></video>

<!-- HUD: estadísticas en tiempo real -->
<div class="hud" id="hud">
  <div class="chip" id="fmt">Formato: —</div>
  <div class="chip" id="res">Resolución: —</div>
  <div class="chip" id="fps">FPS: —</div>
  <div class="chip" id="bits">Bitrate: —</div>
</div>

<div class="controls">
  <button id="btnPreview" class="preview" onclick="startPreview()">PREV</button>
  <button id="btnStart"   class="start"   onclick="startRecording()" disabled>REC</button>
  <button id="btnStop"    class="stop"    onclick="stopRecording()"  disabled>STOP</button>
  <button id="btnSave"    class="save"    onclick="saveVideo()"      disabled>SAVE</button>
</div>

<div class="note">*La grabación en web se detiene si apagas la pantalla o cambias de app (limitación del navegador).</div>

<script>
let stream;
let videoEl = document.getElementById('camera');

let recorder, chunks = [], recordedBlob = null;
let chosenMime = 'video/webm', chosenExt = 'webm';
let fpsEstimate = 0;
let fpsLastTs;

// Preferencias de bitrate (el navegador puede ajustarlas internamente)
const VIDEO_BPS = 12_000_000; // ~12 Mbps
const AUDIO_BPS =   192_000;  // ~192 kbps

// UI
const btnPreview = document.getElementById('btnPreview');
const btnStart   = document.getElementById('btnStart');
const btnStop    = document.getElementById('btnStop');
const btnSave    = document.getElementById('btnSave');

// HUD
const hudFmt = document.getElementById('fmt');
const hudRes = document.getElementById('res');
const hudFps = document.getElementById('fps');
const hudBits= document.getElementById('bits');

// 1) Elegimos el mejor formato disponible: MP4 (H.264/AAC) si el navegador lo soporta (p.ej., Safari),
//    o WebM si no (p.ej., Chrome/Firefox). MediaRecorder.isTypeSupported es la vía recomendada.  [2](https://developer.mozilla.org/en-US/docs/Web/API/MediaRecorder)[1](https://webkit.org/blog/11353/mediarecorder-api/)
function pickBestMimeType() {
  const candidates = [
    { mime: 'video/mp4;codecs="avc1.42E01E,mp4a.40.2"', ext: 'mp4' }, // Safari / iOS típicamente OK
    { mime: 'video/mp4', ext: 'mp4' },
    { mime: 'video/webm;codecs=vp9,opus', ext: 'webm' },
    { mime: 'video/webm;codecs=vp8,opus', ext: 'webm' },
    { mime: 'video/webm', ext: 'webm' }
  ];
  if (window.MediaRecorder && MediaRecorder.isTypeSupported) {
    for (const c of candidates) {
      if (MediaRecorder.isTypeSupported(c.mime)) {
        chosenMime = c.mime; chosenExt = c.ext;
        return;
      }
    }
  }
}

// 2) Arrancamos PREVIEW y negociamos la mejor calidad según capacidades del dispositivo.
//    Flujo: getUserMedia -> getCapabilities() -> applyConstraints() con el máximo soportado.  [7](https://developer.mozilla.org/es/docs/Web/API/MediaDevices/getUserMedia)[3](https://developer.mozilla.org/en-US/docs/Web/API/MediaStreamTrack/getCapabilities)[4](https://developer.mozilla.org/en-US/docs/Web/API/MediaStreamTrack/applyConstraints)
async function startPreview() {
  try {
    // Solicita cámara trasera; sin forzar tamaño aún.
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: {
        echoCancellation:false, noiseSuppression:false, autoGainControl:false
      }
    });

    // Muestra preview
    videoEl.srcObject = stream;

    // Lee capacidades y aplica la mejor combinación segura
    const vTrack = stream.getVideoTracks()[0];
    const caps   = vTrack.getCapabilities ? vTrack.getCapabilities() : null; // puede no estar en todos los UA  [3](https://developer.mozilla.org/en-US/docs/Web/API/MediaStreamTrack/getCapabilities)

    // Política de selección:
    // - Si el device reporta máximos, intentamos el mayor (con límites para evitar sobrecarga)
    // - Si no reporta, pedimos objetivos "altos" (4K/60 como ideal) y dejamos que el UA negocie.  [5](https://devdoc.net/web/developer.mozilla.org/en-US/docs/Media_Capture_and_Streams_API_%28Media_Streams%29/Constraints.html)
    let target = {
      width:     { ideal: 3840 },
      height:    { ideal: 2160 },
      frameRate: { ideal: 60 }
    };

    if (caps) {
      // Elegimos el máximo soportado dentro de límites razonables
      const maxW = caps.width?.max  ?? 1920;
      const maxH = caps.height?.max ?? 1080;
      const maxF = caps.frameRate?.max ?? 30;

      // Cap a top tiers para estabilidad (4K/60 -> 1080p/60 -> 720p/30)
      const wantW  = Math.min(maxW, 3840);
      const wantH  = Math.min(maxH, 2160);
      const wantF  = Math.min(maxF, 60);

      target = { width: { ideal: wantW }, height: { ideal: wantH }, frameRate: { ideal: wantF } };
      // Intento adicional con advanced por si el UA respeta mejor esos deseos.  [4](https://developer.mozilla.org/en-US/docs/Web/API/MediaStreamTrack/applyConstraints)
      target.advanced = [{ width: wantW, height: wantH, frameRate: wantF }];
    }

    try {
      await vTrack.applyConstraints(target); // aplica la mejor calidad que el UA permita  [4](https://developer.mozilla.org/en-US/docs/Web/API/MediaStreamTrack/applyConstraints)
    } catch (e) {
      // Si no pudo, seguimos con el stream tal cual (el UA ya eligió algo compatible)
      console.warn('No se pudieron aplicar los constraints ideales:', e);
    }

    // Habilitamos REC y arrancamos HUD de estado
    btnStart.disabled = false;
    startHudUpdates();

  } catch (err) {
    alert('No se pudo iniciar la cámara: ' + err.message);
    console.error(err);
  }
}

// 3) Grabación (usando MP4 si se puede; WebM en el resto).  [2](https://developer.mozilla.org/en-US/docs/Web/API/MediaRecorder)[1](https://webkit.org/blog/11353/mediarecorder-api/)
function startRecording() {
  pickBestMimeType();
  chunks = [];
  recordedBlob = null;

  recorder = new MediaRecorder(stream, {
    mimeType: chosenMime,
    videoBitsPerSecond: VIDEO_BPS,
    audioBitsPerSecond: AUDIO_BPS
  });
  recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.start();

  btnStart.disabled = true;
  btnStop.disabled  = false;
  btnSave.disabled  = true;

  // Muestra formato/bitrate en el HUD
  hudFmt.textContent = 'Formato: ' + chosenMime;
  hudBits.textContent = `Bitrate: ${(VIDEO_BPS/1e6).toFixed(1)} Mbps`;
}

function stopRecording() {
  if (!recorder) return;
  recorder.onstop = () => {
    recordedBlob = new Blob(chunks, { type: chosenMime });
    btnSave.disabled = false;
  };
  recorder.stop();

  btnStop.disabled = true;
}

function saveVideo() {
  if (!recordedBlob) return;
  const url = URL.createObjectURL(recordedBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `video_${Date.now()}.${chosenExt}`;
  a.click();
  URL.revokeObjectURL(url);

  btnStart.disabled = false;
  btnSave.disabled  = true;
}

// 4) HUD: resolución/FPS en tiempo real.
//    Leemos getSettings() y estimamos FPS con requestVideoFrameCallback si existe.  [5](https://devdoc.net/web/developer.mozilla.org/en-US/docs/Media_Capture_and_Streams_API_%28Media_Streams%29/Constraints.html)
let hudTimer, rVFC;
function startHudUpdates() {
  stopHudUpdates();
  const vTrack = stream.getVideoTracks()[0];

  // Actualiza resolución vía settings
  hudTimer = setInterval(() => {
    const s = vTrack.getSettings ? vTrack.getSettings() : {};
    const w = s.width  || videoEl.videoWidth  || '—';
    const h = s.height || videoEl.videoHeight || '—';
    const f = s.frameRate ? Math.round(s.frameRate) : (fpsEstimate ? Math.round(fpsEstimate) : '—');
    hudRes.textContent = `Resolución: ${w}×${h}`;
    hudFps.textContent = `FPS: ${f}`;
  }, 500);

  // Estimación FPS por frame callback (si el navegador lo soporta)
  if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
    const loop = (now, meta) => {
      if (fpsLastTs) fpsEstimate = 1000 / (now - fpsLastTs);
      fpsLastTs = now;
      rVFC = videoEl.requestVideoFrameCallback(loop);
    };
    rVFC = videoEl.requestVideoFrameCallback(loop);
  }
}
function stopHudUpdates() {
  if (hudTimer) clearInterval(hudTimer), hudTimer = null;
  if (rVFC && 'cancelVideoFrameCallback' in HTMLVideoElement.prototype) {
    videoEl.cancelVideoFrameCallback(rVFC);
    rVFC = null;
  }
}
</script>

</body>
</html>
